<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Contact Us</h1><br>
    </header>

    <!---Add a contact form--->
    <section class="contact-form">
        <h2>Send Us a Message for a quick response</h2><br>
        <form action="submit_contact.html" method="post">
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name" required><br><br>
    <!---Email and input area--->
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required><br><br>
    <!---Text area--->
            <label for="message">Message:</label><br>
            <textarea id="message" name="message" rows="5" required></textarea><br><br>
    <!---Submit button for the form--->
    <form action="submit_enquiry.html" method="post">
        <input type="submit" value="Track Plan">
    </form>
    </section>
    <main>
        <div class="container">
            <section class="contact-info">
                <div class="info-item">
                  <h2>Get in Touch</h2>
                  <p>For inquiries, please contact us at:</p><br>
            <ul>
            <li>Email: <a href="mailto:info@daplanning.co.za">info@daplanning.co.za</a></li>
            <li>Phone: <a href="tel:+27111234567">+27 11 123 4567</a></li>
            <li>Address: 123 Main Street, City, Country</li><br>
            </ul>
        </div>
    </section>
    </main>
